version: 2

builds:
  - env:
      - CGO_ENABLED=0
    dir: cli
    mod_timestamp: '{{ .CommitTimestamp }}'
    flags:
      - -trimpath
    ldflags:
      - '-s -w -X main.version={{.Version}} -X main.commit={{.Commit}} -X main.date={{.Date}}'
    goos:
      - linux
      - darwin
    goarch:
      - amd64
      - arm64
    binary: fai
    main: ./cmd/fai

archives:
  - formats: ['tar.gz']
    name_template: 'fromai.dev-coding-gym_{{ .Version }}_{{ .Os }}_{{ .Arch }}'

checksum:
  name_template: 'fromai.dev-coding-gym_{{ .Version }}_checksums.txt'

brews:
  - name: fai
    homepage: https://github.com/ktappdev/fromai.dev-coding-gym-
    repository:
      owner: ktappdev
      name: tap
      branch: main
    directory: Formula
    commit_author:
      name: goreleaser-bot
      email: bot@goreleaser.com
    description: "CLI for the fromai coding task manager"
    license: MIT
    test: |
      system "#{bin}/fai --help"
    skip_upload: false

changelog:
  sort: asc
  filters:
    exclude:
      - '^docs:'
      - '^test:'
      - '^ci:'
      - '^chore:'
      - '^build:'